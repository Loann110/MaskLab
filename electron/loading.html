<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; img-src data:; style-src 'unsafe-inline'; script-src 'unsafe-inline'; font-src 'none';" />
  <title>SAM3 Mask Creator</title>
  <style>
    :root{
      --bg:#050806; --surface:#0b100c; --raise:#141d14; --line:#2d3d24;
      --text:#f5f8ef; --muted:#a9b89d; --faint:#6d7a63;
      --accent:#c5f23f; --accent-bright:#e1ff72; --accent-dim:#87ad28;
      --ok:#42e7b3;
      --display:"Space Grotesk","Inter Tight","Segoe UI Variable Display","SF Pro Display",system-ui,sans-serif;
      --sans:"Inter","Manrope","Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
      --mono:"JetBrains Mono","Cascadia Code","SF Mono",Consolas,monospace;
    }
    *{box-sizing:border-box;}
    html,body{margin:0;height:100%;overflow:hidden;}
    body{
      color:var(--text); font-family:var(--sans);
      -webkit-user-select:none; user-select:none; -webkit-font-smoothing:antialiased;
      background:
        radial-gradient(900px 520px at 8% -8%, rgba(197,242,63,.16), transparent 62%),
        radial-gradient(900px 620px at 112% 2%, rgba(66,231,179,.08), transparent 58%),
        radial-gradient(650px 480px at 54% 106%, rgba(135,173,40,.08), transparent 60%),
        linear-gradient(180deg,#060a07 0%,var(--bg) 48%,#030503 100%);
    }
    body::before{
      content:""; position:fixed; inset:0; pointer-events:none; opacity:.28;
      background-image:
        linear-gradient(rgba(197,242,63,.045) 1px,transparent 1px),
        linear-gradient(90deg,rgba(197,242,63,.045) 1px,transparent 1px);
      background-size:46px 46px;
      -webkit-mask-image:radial-gradient(circle at 50% 42%,#000 0%,transparent 78%);
              mask-image:radial-gradient(circle at 50% 42%,#000 0%,transparent 78%);
    }
    .wrap{
      position:relative; height:100%;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:30px; padding:32px; text-align:center;
    }
    .badge{
      width:128px; height:128px; border-radius:26px;
      background:#fff; border:1px solid var(--line);
      box-shadow:0 22px 60px rgba(0,0,0,.55);
      display:flex; align-items:center; justify-content:center; overflow:hidden;
    }
    .badge img{ width:96px; height:96px; object-fit:contain; }
    .brand{ display:flex; flex-direction:column; gap:4px; }
    .brand-name{
      font-family:var(--display); font-size:30px; font-weight:700; letter-spacing:-.5px; margin:0;
      background:linear-gradient(135deg,var(--text),var(--accent-bright));
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    }
    .brand-sub{
      font-family:var(--mono); font-size:11px; letter-spacing:2.5px; text-transform:uppercase;
      color:var(--accent-dim);
    }
    .prog{ width:min(420px,76vw); }
    .bar{
      position:relative; height:6px; border-radius:99px; overflow:hidden;
      background:rgba(197,242,63,.10); border:1px solid var(--line);
    }
    .bar::before{
      content:""; position:absolute; top:0; bottom:0; width:38%; border-radius:99px;
      background:linear-gradient(90deg,transparent,var(--accent),var(--accent-bright),transparent);
      animation:slide 1.5s ease-in-out infinite;
    }
    @keyframes slide{ 0%{left:-40%;} 100%{left:100%;} }
    #status{ margin-top:16px; min-height:20px; color:var(--text); font-size:14px; font-weight:500; line-height:1.5; }
    #status .dots::after{ content:""; animation:dots 1.4s steps(4,end) infinite; }
    @keyframes dots{ 0%{content:"";} 25%{content:".";} 50%{content:"..";} 75%{content:"...";} }
    .hint{ margin-top:6px; color:var(--faint); font-size:12px; max-width:380px; line-height:1.5; }
    .hint code{ font-family:var(--mono); font-size:11px; color:var(--accent); background:rgba(197,242,63,.10); padding:1px 5px; border-radius:5px; }
    .err{ color:#ffb3b3 !important; }
  </style>
</head>

  <script>
    window.setStatus = function (msg, isError) {
      var el = document.getElementById('status');
      if (!el) return;
      el.classList.toggle('err', !!isError);
      if (isError) { el.textContent = String(msg); }
      else { el.innerHTML = String(msg).replace(/</g,'&lt;') + '<span class="dots"></span>'; }
    };
    (function () {
      var steps = [
        "Démarrage du moteur Python",
        "Chargement de PyTorch",
        "Préparation du modèle SAM3",
        "Démarrage du serveur local"
      ];
      var i = 0, touched = false, orig = window.setStatus;
      window.setStatus = function (m, e) { touched = true; orig(m, e); };
      var t = setInterval(function () {
        if (touched) { clearInterval(t); return; }
        orig(steps[i % steps.length]); i++;
      }, 2200);
      orig(steps[0]);
    })();
